services:
  - type: web
    name: zuivellogboek
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: zuivellogboek-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: LOGBOOK_USER
        value: annemiek
      - key: LOGBOOK_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
